<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua & Anjanette | Save The Date</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <img src="couple.jpg" alt="Joshua & Anjanette" class="profile-photo slide-in">
        
        <h1 class="names slide-in">
            <span class="top-name">Anjanette</span>
            <span class="middle-word">&</span>
            <span class="bottom-name">Joshua</span>
        </h1>

        <p class="subtitle fade-up">Save the Date</p>

        <div id="countdown" class="fade-up">
            <div class="time-box">
                <span id="days">00</span>
                <small>DAYS</small>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <small>HRS</small>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <small>MINS</small>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <small>SECS</small>
            </div>
        </div>

        <div class="event-details fade-up">
            <p class="date"><b>SEPTEMBER 19, 2026</b></p>
            <p>DOS VILLA, INFANTA, QUEZON</p>
            <p class="dress-code">DRESS CODE: FORMAL</p>
        </div>

        <a href="YOUR_RSVP_LINK_HERE" class="rsvp-btn fade-up">BE OUR GUEST</a>
    </div>

    <audio id="myAudio" loop preload="auto">
        <source src="Be Our Guest2.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
