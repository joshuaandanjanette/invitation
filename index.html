<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua & Anjanette | Save The Date</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="petal-container"></div>

    <div class="container">
        <img src="TBATBgold.png" alt="Joshua & Anjanette" class="profile-photo slide-in">
        
        <h1 class="names slide-in">
            <span class="top-name">Anjanette</span>
            <span class="middle-word">&</span>
            <span class="bottom-name">Joshua</span>
        </h1>

        <p class="subtitle fade-up">Save the Date</p>

        <div id="countdown" class="fade-up">
            <div class="time-box"><span id="days">00</span><small>DAYS</small></div>
            <div class="time-box"><span id="hours">00</span><small>HRS</small></div>
            <div class="time-box"><span id="minutes">00</span><small>MINS</small></div>
            <div class="time-box"><span id="seconds">00</span><small>SECS</small></div>
        </div>

        <div class="event-details fade-up">
            <p class="date"><b>SEPTEMBER 19, 2026</b></p>
            <p><a href="https://maps.app.goo.gl/1LUuQvefVpjCDRQ28" target="_blank" class="venue-link">ST. MARK CATHEDRAL</a></p>
            <p><a href="https://maps.app.goo.gl/V9qNxVp2aiiKnSh27" target="_blank" class="venue-link">DOS VILLA</a></p>
        </div>

        <div class="palette-wrap fade-up">
            <p class="palette-label">DRESS CODE:</p>
            <div class="color-cubes">
                <div class="cube" style="background: #FFFFFF;"></div>
                <div class="cube" style="background: #000000;"></div>
                <div class="cube" style="background: #A57756;"></div>
                <div class="cube" style="background: #CBAC8D;"></div>
            </div>
        </div>

        <a href="https://docs.google.com/forms/d/e/1FAIpQLScr-dKpNfhd4oMu4u3ymgh1kXsMvftQqggleZElVwtqb6UX3Q/viewform?usp=header" class="rsvp-btn fade-up">BE OUR GUEST</a>
    </div>

    <audio id="myAudio" loop preload="auto">
        <source src="Be Our Guest2.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
